server.port=8082
spring.application.name=service-offer-service

# =========================
# H2 DATABASE
# =========================
spring.datasource.url=jdbc:h2:mem:offerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================
# RABBITMQ
# =========================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# =========================
# RABBITMQ QUEUES & EXCHANGES
# =========================

rabbitmq.exchange.notifications=notifications.exchange

# EXISTING QUEUE
rabbitmq.queue.booking-confirmed-provider=booking.confirmed.provider

# NEW QUEUE FOR CUSTOMER SERVICE REQUESTS
rabbitmq.queue.service-request-provider=service.request.provider

# =========================
# EXTERNAL SERVICES
# =========================
user-service.url=http://localhost:8081

# BOOKING SERVICE
offer-service.url=http://localhost:8082